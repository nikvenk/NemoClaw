# NemoClaw on Kubernetes
# Uses openshell-vm (microVM gateway) — no Docker-in-Docker required.
# Prerequisites:
#   - kubectl create namespace nemoclaw
#   - Node must have /dev/kvm (bare-metal or nested virt enabled)
apiVersion: v1
kind: Pod
metadata:
  name: nemoclaw
  namespace: nemoclaw
  labels:
    app: nemoclaw
spec:
  securityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  automountServiceAccountToken: false
  enableServiceLinks: false
  containers:
    - name: workspace
      image: node:22
      securityContext:
        privileged: true  # required for /dev/kvm access (microVM)
      command:
        - bash
        - -c
        - |
          set -e

          # Install packages
          echo "[1/3] Installing packages..."
          apt-get update -qq
          apt-get install -y -qq socat curl >/dev/null 2>&1

          # Start socat proxy for K8s DNS bridge
          echo "[2/3] Starting socat proxy..."
          socat TCP-LISTEN:8000,fork,reuseaddr TCP:$DYNAMO_HOST &
          echo "127.0.0.1 host.openshell.internal" >> /etc/hosts
          sleep 1

          # Install openshell-vm (microVM gateway — no Docker needed)
          echo "[3/3] Installing openshell-vm and running NemoClaw..."
          curl -fsSL https://raw.githubusercontent.com/NVIDIA/OpenShell/main/install-vm.sh | sh
          curl -fsSL https://nvidia.com/nemoclaw.sh | bash

          # Keep running after onboard
          echo "Onboard complete. Container staying alive."
          exec sleep infinity
      env:
        - name: NEMOCLAW_GATEWAY_BACKEND
          value: "vm"
        # Dynamo endpoint (raw host:port for socat) - UPDATE THIS FOR YOUR CLUSTER
        - name: DYNAMO_HOST
          value: "vllm-disagg-frontend.dynamo.svc.cluster.local:8000"
        # NemoClaw config (uses host.openshell.internal via socat)
        - name: NEMOCLAW_NON_INTERACTIVE
          value: "1"
        - name: NEMOCLAW_PROVIDER
          value: "custom"
        - name: NEMOCLAW_ENDPOINT_URL
          value: "http://host.openshell.internal:8000/v1"
        - name: COMPATIBLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: nemoclaw-compatible-api-key
              key: api-key
              optional: true
        - name: NEMOCLAW_MODEL
          value: "meta-llama/Llama-3.1-8B-Instruct"
        - name: NEMOCLAW_SANDBOX_NAME
          value: "my-assistant"
        - name: NEMOCLAW_POLICY_MODE
          value: "suggested"
        - name: NEMOCLAW_ACCEPT_THIRD_PARTY_SOFTWARE
          value: "1"
      resources:
        requests:
          memory: "8Gi"
          cpu: "4"

  restartPolicy: Never
